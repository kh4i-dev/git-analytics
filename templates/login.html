<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng Nhập - Git Analytics</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: #f6f8fa;
        color: #24292f;
      }

      main {
        width: min(420px, calc(100vw - 32px));
        padding: 32px;
        background: #ffffff;
        border: 1px solid #d0d7de;
        border-radius: 8px;
      }

      h1 {
        margin: 0 0 24px;
        font-size: 24px;
      }

      a {
        display: inline-block;
        width: 100%;
        box-sizing: border-box;
        padding: 12px 16px;
        border-radius: 6px;
        background: #24292f;
        color: #ffffff;
        text-align: center;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Git Analytics</h1>
      <a href="{{ login_url }}">Đăng Nhập với GitHub</a>
    </main>
  </body>
</html>
