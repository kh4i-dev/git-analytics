{% extends 'layouts/dashboard_base.html' %}

{% block title %}Tin Tức Dev — Git Analytics{% endblock %}

{% block content %}
<div class="developer-news-container">
  <!-- Page Header -->
  <div class="dh-header" style="margin-bottom: 24px;">
    <h1 style="font-size: 24px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; margin-bottom: 4px;">Tin Tức Dev</h1>
    <p style="font-size: 14px; color: var(--text-muted);">Cập nhật những tin tức công nghệ mới nhất từ Hacker News, Dev.to và GitHub.</p>
  </div>

  <!-- Filters & Tabs -->
  <div class="news-controls">
    <div class="news-tabs">
      <button class="tab-btn active" data-tab="all">Tất cả</button>
      <button class="tab-btn" data-tab="hn">Hacker News</button>
      <button class="tab-btn" data-tab="devto">Dev.to Tech</button>
      <button class="tab-btn" data-tab="github">GitHub Updates</button>
    </div>
    
    <div class="search-box-container">
      <input type="text" id="news-search" placeholder="Tìm kiếm bài viết..." />
      <span class="search-icon">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </span>
    </div>
  </div>

  <!-- Loading Skeletons -->
  <div id="news-loading" class="news-grid">
    <div class="news-card skeleton-card">
      <div class="skeleton-img skeleton"></div>
      <div class="skeleton-title skeleton"></div>
      <div class="skeleton-text skeleton"></div>
      <div class="skeleton-text skeleton" style="width: 60%"></div>
    </div>
    <div class="news-card skeleton-card">
      <div class="skeleton-img skeleton"></div>
      <div class="skeleton-title skeleton"></div>
      <div class="skeleton-text skeleton"></div>
      <div class="skeleton-text skeleton" style="width: 60%"></div>
    </div>
    <div class="news-card skeleton-card">
      <div class="skeleton-img skeleton"></div>
      <div class="skeleton-title skeleton"></div>
      <div class="skeleton-text skeleton"></div>
      <div class="skeleton-text skeleton" style="width: 60%"></div>
    </div>
  </div>

  <!-- News Content Grid -->
  <div id="news-content-grid" class="news-grid" style="display: none;">
    <!-- Items dynamically inserted -->
  </div>
</div>

<style>
  .news-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  
  .news-tabs {
    display: flex;
    background: var(--surface-2);
    padding: 3px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  
  .tab-btn {
    background: transparent;
    border: none;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: calc(var(--radius) - 2px);
    transition: color 0.15s, background 0.15s;
  }
  
  .tab-btn:hover {
    color: var(--text);
  }
  
  .tab-btn.active {
    background: var(--surface-3);
    color: var(--text);
  }
  
  .search-box-container {
    position: relative;
    max-width: 300px;
    width: 100%;
  }
  
  #news-search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 7px 12px 7px 32px;
    color: var(--text);
    font-size: 13px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  
  #news-search:focus {
    outline: none;
    border-color: var(--text-link);
    box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
  }
  
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    color: var(--text-muted);
    pointer-events: none;
  }

  .news-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .news-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg, 10px);
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    height: 100%;
    min-height: 220px;
  }

  .news-card:hover {
    transform: translateY(-2px);
    border-color: #444d56;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }

  .news-source-badge {
    align-self: flex-start;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 12px;
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }
  
  .badge-hn { background: rgba(255, 102, 0, 0.1); color: rgb(255, 102, 0); border: 1px solid rgba(255, 102, 0, 0.3); }
  .badge-devto { background: rgba(255, 255, 255, 0.1); color: var(--text); border: 1px solid var(--border); }
  .badge-github { background: rgba(188, 140, 255, 0.1); color: var(--purple); border: 1px solid rgba(188, 140, 255, 0.3); }

  .news-title {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text);
    margin-bottom: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .news-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-bottom: 16px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .news-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--text-muted);
    border-top: 1px solid var(--border-sub);
    padding-top: 12px;
    margin-top: auto;
  }

  .news-btn {
    color: var(--text-link);
    text-decoration: none;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    transition: color 0.15s;
  }

  .news-btn:hover {
    color: #79c0ff;
    text-decoration: underline;
  }

  /* Skeletons CSS */
  .skeleton-card {
    pointer-events: none;
  }
  
  .skeleton {
    background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
    background-size: 200% 100%;
    animation: loading 1.5s infinite;
  }
  
  .skeleton-img {
    height: 18px;
    width: 80px;
    border-radius: 12px;
    margin-bottom: 16px;
  }
  
  .skeleton-title {
    height: 22px;
    border-radius: 4px;
    margin-bottom: 12px;
  }
  
  .skeleton-text {
    height: 13px;
    border-radius: 4px;
    margin-bottom: 8px;
  }
</style>
{% endblock %}

{% block page_scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
  const loadingEl = document.getElementById('news-loading');
  const gridEl = document.getElementById('news-content-grid');
  const searchInput = document.getElementById('news-search');
  const tabButtons = document.querySelectorAll('.tab-btn');

  let allArticles = [];
  let currentTab = 'all';
  let searchQuery = '';

  const mockGithubUpdates = [
    {
      source: 'github',
      title: 'GitHub Copilot Workspace: Giờ đây đã hỗ trợ các repository lớn',
      description: 'Copilot Workspace nâng cấp khả năng xử lý ngữ cảnh sâu cho toàn bộ repo quy mô lớn của doanh nghiệp, giúp việc code automation hiệu quả hơn gấp 3 lần.',
      url: 'https://github.blog',
      author: 'GitHub Engineering',
      time: '1 ngày trước'
    },
    {
      source: 'github',
      title: 'GitHub Actions: Ra mắt Runner Arm64 hosted chính thức',
      description: 'Các dự án giờ đây có thể chạy CI/CD nhanh hơn và tiết kiệm chi phí hơn 40% với hệ thống máy ảo Arm64 do GitHub trực tiếp vận hành.',
      url: 'https://github.blog',
      author: 'GitHub Actions Team',
      time: '3 ngày trước'
    },
    {
      source: 'github',
      title: 'Cải tiến bảo mật mã nguồn với GitHub Advanced Security',
      description: 'Ra mắt tính năng quét mã nguồn tự động theo thời gian thực (Push Protection) áp dụng cho mọi repository công khai trên toàn hệ thống.',
      url: 'https://github.blog',
      author: 'GitHub Security',
      time: '5 ngày trước'
    }
  ];

  async function fetchNews() {
    try {
      // Fetch Dev.to Tech Articles
      let devtoArticles = [];
      try {
        const res = await fetch('https://dev.to/api/articles?tag=programming&per_page=15');
        if (res.ok) {
          const data = await res.json();
          devtoArticles = data.map(item => ({
            source: 'devto',
            title: item.title,
            description: item.description || 'Không có mô tả chi tiết bài viết.',
            url: item.url,
            author: item.user.name,
            time: formatDate(item.published_at)
          }));
        }
      } catch (err) {
        console.warn('Failed to fetch from Dev.to:', err);
      }

      // Fetch Hacker News Top Stories (via Algolia search API which is faster and supports tags)
      let hnArticles = [];
      try {
        const res = await fetch('https://hn.algolia.com/api/v1/search?tags=front_page&numericFilters=created_at_i>0&hitsPerPage=15');
        if (res.ok) {
          const data = await res.json();
          hnArticles = data.hits.map(item => ({
            source: 'hn',
            title: item.title,
            description: `Điểm số: ${item.points} | Người đăng: ${item.author} | Số bình luận: ${item.num_comments}`,
            url: item.url || `https://news.ycombinator.com/item?id=${item.objectID}`,
            author: item.author,
            time: formatDate(item.created_at)
          }));
        }
      } catch (err) {
        console.warn('Failed to fetch from HackerNews:', err);
      }

      // Combine articles
      allArticles = [...devtoArticles, ...hnArticles, ...mockGithubUpdates];
      
      // Shuffle combined news slightly for dynamic feel
      allArticles.sort(() => 0.5 - Math.random());

      renderArticles();
    } catch (err) {
      console.error('Error handling news load:', err);
      // Fallback only mock
      allArticles = [...mockGithubUpdates];
      renderArticles();
    } finally {
      loadingEl.style.display = 'none';
      gridEl.style.display = 'grid';
    }
  }

  function formatDate(isoStr) {
    if (!isoStr) return 'vừa xong';
    const date = new Date(isoStr);
    const now = new Date();
    const diffMs = now - date;
    const diffHrs = Math.floor(diffMs / 3600000);
    if (diffHrs < 1) return 'vừa xong';
    if (diffHrs < 24) return `${diffHrs} giờ trước`;
    const diffDays = Math.floor(diffHrs / 24);
    return `${diffDays} ngày trước`;
  }

  function renderArticles() {
    gridEl.innerHTML = '';
    
    // Filter
    const filtered = allArticles.filter(item => {
      const matchesTab = currentTab === 'all' || item.source === currentTab;
      const matchesSearch = item.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                            item.description.toLowerCase().includes(searchQuery.toLowerCase()) ||
                            item.author.toLowerCase().includes(searchQuery.toLowerCase());
      return matchesTab && matchesSearch;
    });

    if (filtered.length === 0) {
      gridEl.innerHTML = `
        <div style="grid-column: 1 / -1; text-align: center; padding: 48px var(--radius);">
          <div class="empty-icon" style="margin-bottom:12px;"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></div>
          <h3 style="color:var(--text); font-weight:600; margin-bottom:6px;">Không tìm thấy tin tức</h3>
          <p style="color:var(--text-muted); font-size:13px;">Hãy thử tìm kiếm với từ khóa khác.</p>
        </div>
      `;
      return;
    }

    filtered.forEach(item => {
      const card = document.createElement('div');
      card.className = 'news-card';
      
      let sourceName = 'Dev.to';
      let badgeClass = 'badge-devto';
      if (item.source === 'hn') {
        sourceName = 'Hacker News';
        badgeClass = 'badge-hn';
      } else if (item.source === 'github') {
        sourceName = 'GitHub Update';
        badgeClass = 'badge-github';
      }

      card.innerHTML = `
        <div>
          <span class="news-source-badge ${badgeClass}">${sourceName}</span>
          <h3 class="news-title" title="${escHtml(item.title)}">${escHtml(item.title)}</h3>
          <p class="news-desc">${escHtml(item.description)}</p>
        </div>
        <div class="news-meta">
          <span>Bởi: <strong>${escHtml(item.author)}</strong> · ${item.time}</span>
          <a href="${item.url}" target="_blank" class="news-btn" rel="noopener">
            Xem bài viết
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
          </a>
        </div>
      `;
      gridEl.appendChild(card);
    });
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Event Listeners
  searchInput.addEventListener('input', (e) => {
    searchQuery = e.target.value;
    renderArticles();
  });

  tabButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      tabButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTab = btn.getAttribute('data-tab');
      renderArticles();
    });
  });

  // Start load
  fetchNews();
});
</script>
{% endblock %}
