<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Git Analytics{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #0d1117;
        --bg-soft: #111723;
        --surface: rgba(22, 27, 34, 0.86);
        --surface-2: rgba(31, 36, 48, 0.9);
        --surface-3: #252b3a;
        --border: rgba(139, 148, 158, 0.22);
        --border-sub: rgba(139, 148, 158, 0.12);
        --text: #e6edf3;
        --text-muted: #9ba7bd;
        --text-soft: #c7d2ea;
        --text-link: #79c0ff;
        --purple: #b9a7ff;
        --success-text: #a7f3b8;
        --success-bg: rgba(35, 134, 54, 0.16);
        --success-border: rgba(63, 185, 80, 0.35);
        --warn-text: #ffd38a;
        --warn-bg: rgba(187, 128, 9, 0.14);
        --warn-border: rgba(210, 153, 34, 0.36);
        --danger-text: #ff8b8b;
        --radius: 8px;
        --radius-lg: 12px;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
      }
      * { box-sizing: border-box; }
      html { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 18% -10%, rgba(88, 166, 255, 0.16), transparent 34%),
          radial-gradient(circle at 86% 0%, rgba(185, 167, 255, 0.12), transparent 30%),
          linear-gradient(180deg, #0d1117 0%, #0b0f15 100%);
        color: var(--text);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.22;
        background-image:
          linear-gradient(rgba(139, 148, 158, 0.12) 1px, transparent 1px),
          linear-gradient(90deg, rgba(139, 148, 158, 0.12) 1px, transparent 1px);
        background-size: 42px 42px;
        mask-image: linear-gradient(to bottom, black, transparent 72%);
      }
      a { color: inherit; }
      .public-nav {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 14px clamp(18px, 4vw, 54px);
        border-bottom: 1px solid var(--border-sub);
        background: rgba(13, 17, 23, 0.76);
        backdrop-filter: blur(16px);
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 800;
        letter-spacing: 0;
        text-decoration: none;
      }
      .brand-mark {
        width: 34px;
        height: 34px;
        border-radius: 9px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #6aa5ff, #9b8cff);
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.16);
      }
      .brand-mark svg { width: 18px; height: 18px; }
      .public-links {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .public-links a {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 13px;
        font-weight: 600;
        padding: 8px 10px;
        border-radius: 8px;
        transition: color .16s ease, background .16s ease;
      }
      .public-links a:hover,
      .public-links a.active {
        color: var(--text);
        background: rgba(139, 148, 158, 0.12);
      }
      .public-actions { display: flex; align-items: center; gap: 10px; }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 36px;
        padding: 8px 13px;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        background: var(--surface-2);
        text-decoration: none;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        transition: transform .16s ease, border-color .16s ease, background .16s ease;
      }
      .btn:hover { transform: translateY(-1px); border-color: rgba(121, 192, 255, .45); }
      .btn-primary {
        background: #f0f6fc;
        color: #0d1117;
        border-color: #f0f6fc;
      }
      .btn-sm { min-height: 32px; padding: 6px 10px; font-size: 12px; }
      .public-page {
        width: min(1240px, calc(100vw - 36px));
        margin: 0 auto;
        padding: 32px 0 64px;
        position: relative;
        z-index: 1;
      }
      .section-title {
        color: var(--text);
        font-weight: 800;
        font-size: 13px;
        letter-spacing: .02em;
        text-transform: uppercase;
      }
      .section-count {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 20px;
        height: 20px;
        margin-left: 6px;
        border-radius: 999px;
        background: var(--surface-2);
        color: var(--text-muted);
        font-size: 11px;
      }
      .empty-state {
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background: var(--surface);
        padding: 28px;
        text-align: center;
        color: var(--text-muted);
      }
      .empty-state h3 { margin: 8px 0 4px; color: var(--text); font-size: 15px; }
      .empty-state p { margin: 0; font-size: 13px; }
      @media (max-width: 760px) {
        .public-nav { align-items: flex-start; flex-direction: column; }
        .public-links { width: 100%; overflow-x: auto; }
        .public-actions { position: absolute; top: 14px; right: 18px; }
        .brand span { max-width: 150px; overflow: hidden; text-overflow: ellipsis; }
      }
    </style>
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <header class="public-nav">
      <a class="brand" href="/explore">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3"/><path d="M12 19v3"/><path d="m4.93 4.93 2.12 2.12"/><path d="m16.95 16.95 2.12 2.12"/><path d="M2 12h3"/><path d="M19 12h3"/><path d="m4.93 19.07 2.12-2.12"/><path d="m16.95 7.05 2.12-2.12"/></svg>
        </span>
        <span>Git Analytics</span>
      </a>
      <nav class="public-links" aria-label="Public navigation">
        <a href="/explore" class="{{ 'active' if active_page == 'explore' else '' }}">Explore</a>
        <a href="/developer-news" class="{{ 'active' if active_page == 'developer_news' else '' }}">Developer News</a>
        <a href="/ai-tools" class="{{ 'active' if active_page == 'ai_tools' else '' }}">AI Tools</a>
      </nav>
      <div class="public-actions">
        <a class="btn btn-primary" href="/login">Đăng nhập</a>
      </div>
    </header>
    <main class="public-page">
      {% block content %}{% endblock %}
    </main>
    <script>
      window.showError = function(message) {
        const alert = document.createElement('div');
        alert.style.cssText = 'position:fixed;right:18px;bottom:18px;z-index:50;max-width:360px;padding:12px 14px;border:1px solid var(--warn-border);border-radius:10px;background:var(--warn-bg);color:var(--warn-text);font-size:13px;box-shadow:var(--shadow)';
        alert.textContent = message;
        document.body.appendChild(alert);
        setTimeout(() => alert.remove(), 4200);
      };
      window.fetchAnalytics = async function(path) {
        const response = await fetch(path, {credentials: 'same-origin'});
        const payload = await response.json();
        if (!response.ok || payload.error) {
          throw new Error(payload.error?.message || `HTTP ${response.status}`);
        }
        return payload.data;
      };
      window.GitAnalyticsTime = {
        relative(value) {
          const date = new Date(value);
          const diff = Date.now() - date.getTime();
          const minute = 60 * 1000;
          const hour = 60 * minute;
          const day = 24 * hour;
          if (!Number.isFinite(date.getTime())) return 'vừa xong';
          if (diff < minute) return 'vừa xong';
          if (diff < hour) return `${Math.floor(diff / minute)} phút trước`;
          if (diff < day) return `${Math.floor(diff / hour)} giờ trước`;
          if (diff < day * 2) return 'hôm qua';
          return `${Math.floor(diff / day)} ngày trước`;
        }
      };
    </script>
    {% block page_scripts %}{% endblock %}
  </body>
</html>
