{% extends 'layouts/dashboard_base.html' %}

{% block title %}{{ title }} — Git Analytics{% endblock %}

{% block content %}
<div class="placeholder-container">
  <div class="placeholder-card">
    <div class="placeholder-glow"></div>
    <div class="placeholder-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(88,166,255,0.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
    </div>
    <h1 class="placeholder-title">{{ title }}</h1>
    <p class="placeholder-subtitle">{{ subtitle }}</p>
    
    <div class="placeholder-divider"></div>
    
    <div class="placeholder-status-grid">
      <div class="status-item">
        <span class="status-dot status-pulse"></span>
        <span class="status-label">Đang phát triển</span>
      </div>
      <div class="status-item">
        <span class="status-label-secondary">Target: v1.1.0</span>
      </div>
    </div>

    <div class="placeholder-actions">
      <a href="/dashboard" class="btn btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg>
        Về Tổng Quan
      </a>
      <a href="/repositories" class="btn btn-outline">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Kho Lưu Trữ
      </a>
    </div>
  </div>
</div>

<style>
  .placeholder-container {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 200px);
    padding: 24px;
  }
  
  .placeholder-card {
    position: relative;
    max-width: 600px;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg, 10px);
    padding: 48px 40px;
    text-align: center;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
  }
  
  .placeholder-glow {
    position: absolute;
    top: -150px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(88, 166, 255, 0.08) 0%, rgba(0,0,0,0) 70%);
    pointer-events: none;
  }

  .placeholder-icon {
    width: 72px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    background: rgba(88, 166, 255, 0.06);
    border: 1px solid rgba(88, 166, 255, 0.15);
    border-radius: 20px;
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .placeholder-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 12px;
    letter-spacing: -0.5px;
  }

  .placeholder-subtitle {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 32px;
    max-width: 460px;
    margin-left: auto;
    margin-right: auto;
  }

  .placeholder-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border) 15%, var(--border) 85%, transparent);
    margin-bottom: 24px;
  }

  .placeholder-status-grid {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin-bottom: 32px;
    font-size: 13px;
  }

  .status-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--purple);
  }

  .status-pulse {
    box-shadow: 0 0 0 0 rgba(188, 140, 255, 0.4);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% {
      transform: scale(0.95);
      box-shadow: 0 0 0 0 rgba(188, 140, 255, 0.7);
    }
    70% {
      transform: scale(1);
      box-shadow: 0 0 0 6px rgba(188, 140, 255, 0);
    }
    100% {
      transform: scale(0.95);
      box-shadow: 0 0 0 0 rgba(188, 140, 255, 0);
    }
  }

  .status-label {
    font-weight: 600;
    color: var(--text);
  }

  .status-label-secondary {
    color: var(--text-muted);
    background: var(--surface-2);
    padding: 2px 8px;
    border-radius: 12px;
    border: 1px solid var(--border);
    font-size: 11px;
    font-weight: 500;
  }

  .placeholder-actions {
    display: flex;
    justify-content: center;
    gap: 12px;
  }
</style>
{% endblock %}
