{% extends 'layouts/dashboard_base.html' %}

{% block title %}Tổng Quan Điều Hành - Git Analytics{% endblock %}

{% block extra_head %}
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  .exec-hero {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 20px;
  }
  .eyebrow,
  .panel-kicker,
  .metric-label {
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .exec-hero h1 {
    margin-top: 4px;
    color: var(--text);
    font-size: 28px;
    line-height: 1.1;
    font-weight: 750;
  }
  .exec-subtitle {
    margin-top: 8px;
    max-width: 760px;
    color: var(--text-muted);
    font-size: 14px;
  }
  .exec-hero-actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 8px;
  }
  .live-pill,
  .status-badge,
  .panel-stat {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: rgba(22, 27, 34, .82);
    color: var(--text);
    font-size: 12px;
    font-weight: 650;
    padding: 5px 10px;
    white-space: nowrap;
    text-decoration: none;
  }
  .live-pill svg,
  .metric-icon svg,
  .insight-icon svg,
  .empty-icon svg {
    width: 16px;
    height: 16px;
  }
  .live-pill.muted {
    color: var(--text-muted);
  }
  .exec-kpi-grid,
  .insight-grid,
  .team-kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
    margin-bottom: 16px;
  }
  .metric-card,
  .analytics-panel,
  .insight-card {
    border: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(22, 27, 34, .86), rgba(13, 17, 23, .98));
    border-radius: var(--radius-lg);
    box-shadow: 0 14px 40px rgba(0, 0, 0, .18);
  }
  .metric-card {
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 112px;
    padding: 16px;
  }
  .metric-icon,
  .insight-icon {
    display: grid;
    place-items: center;
    width: 36px;
    height: 36px;
    flex: 0 0 auto;
    border: 1px solid rgba(88, 166, 255, .24);
    border-radius: 9px;
    color: var(--text-link);
    background: rgba(88, 166, 255, .08);
  }
  .metric-card strong {
    display: block;
    margin-top: 5px;
    color: var(--text);
    font-size: 28px;
    line-height: 1;
  }
  .metric-card span,
  .insight-card span,
  .leader-main span,
  .repo-row strong,
  .timeline-item p,
  .timeline-item span {
    color: var(--text-muted);
    font-size: 12px;
  }
  .exec-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
    margin-bottom: 16px;
  }
  .exec-grid-main {
    grid-template-columns: minmax(360px, .9fr) minmax(420px, 1.1fr);
  }
  .analytics-panel {
    min-width: 0;
    padding: 18px;
  }
  .panel-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 14px;
    margin-bottom: 16px;
  }
  .panel-header h2 {
    margin-top: 3px;
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
  }
  .status-positive {
    border-color: rgba(63, 185, 80, .28);
    background: rgba(63, 185, 80, .08);
    color: var(--success-text);
  }
  .status-warning {
    border-color: rgba(227, 179, 65, .3);
    background: rgba(227, 179, 65, .08);
    color: var(--warn-text);
  }
  .status-critical {
    border-color: rgba(248, 81, 73, .3);
    background: rgba(248, 81, 73, .08);
    color: var(--danger-text);
  }
  .health-body {
    display: grid;
    grid-template-columns: 150px 1fr;
    gap: 18px;
    align-items: center;
  }
  .health-ring {
    width: 140px;
    height: 140px;
    display: grid;
    place-items: center;
    border-radius: 50%;
    background:
      radial-gradient(circle at center, var(--surface) 57%, transparent 58%),
      conic-gradient(from 220deg, #3fb950 var(--score), rgba(48, 54, 61, .7) 0);
    box-shadow: inset 0 0 24px rgba(88, 166, 255, .08), 0 0 24px rgba(63, 185, 80, .08);
  }
  .health-ring span {
    color: var(--text);
    font-size: 36px;
    font-weight: 800;
    line-height: 1;
  }
  .health-ring small {
    margin-top: -48px;
    color: var(--text-muted);
    font-size: 11px;
  }
  .health-copy p {
    margin-bottom: 12px;
    color: var(--text);
    font-size: 14px;
  }
  .health-copy strong,
  .leader-main strong,
  .leader-name-link,
  .timeline-top strong {
    display: block;
    color: var(--text);
    font-size: 13px;
  }
  .leader-name-link,
  .kpi-person-link {
    text-decoration: none;
  }
  .leader-name-link:hover,
  .kpi-person-link:hover {
    color: var(--text-link);
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .health-copy span {
    color: var(--text-muted);
    font-size: 13px;
  }
  .breakdown-list {
    display: grid;
    gap: 9px;
    margin-top: 18px;
  }
  .breakdown-row {
    display: grid;
    grid-template-columns: 132px 1fr 34px;
    gap: 10px;
    align-items: center;
    color: var(--text-muted);
    font-size: 12px;
  }
  .breakdown-row strong {
    color: var(--text);
    text-align: right;
  }
  .breakdown-track {
    height: 6px;
    overflow: hidden;
    border-radius: 999px;
    background: var(--surface-3);
  }
  .breakdown-track i {
    display: block;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, #2f81f7, #3fb950);
  }
  .commit-heatmap {
    min-height: 174px;
    width: 100%;
    max-width: 100%;
    overflow-x: auto;
    overflow-y: hidden;
    padding-bottom: 8px;
    scrollbar-gutter: stable;
  }
  .heatmap-container {
    --heatmap-cell: 12px;
    --heatmap-gap: 4px;
    display: grid;
    grid-template-columns: 32px max-content;
    grid-template-rows: auto auto auto;
    column-gap: 10px;
    row-gap: 6px;
    width: fit-content;
    min-width: 100%;
    justify-content: center;
    margin-inline: auto;
  }
  .month-headers {
    grid-row: 1;
    grid-column: 2;
    display: grid;
    grid-template-columns: repeat(var(--heatmap-columns, 53), var(--heatmap-cell));
    gap: var(--heatmap-gap);
    width: fit-content;
    max-width: calc((var(--heatmap-columns, 53) * var(--heatmap-cell)) + ((var(--heatmap-columns, 53) - 1) * var(--heatmap-gap)));
    height: 18px;
    overflow: hidden;
  }
  .month-label {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text-muted);
    font-size: 10px;
    line-height: 16px;
    font-weight: 600;
  }
  .day-labels {
    grid-row: 2;
    grid-column: 1;
    display: grid;
    grid-template-rows: repeat(7, var(--heatmap-cell));
    gap: var(--heatmap-gap);
    align-items: center;
    color: var(--text-muted);
    font-size: 9px;
    text-align: right;
    white-space: nowrap;
  }
  .heatmap-grid {
    grid-row: 2;
    grid-column: 2;
    display: grid;
    grid-auto-flow: column;
    grid-template-rows: repeat(7, var(--heatmap-cell));
    grid-template-columns: repeat(var(--heatmap-columns, 53), var(--heatmap-cell));
    gap: var(--heatmap-gap);
    width: fit-content;
    max-width: none;
  }
  .heatmap-day {
    width: var(--heatmap-cell);
    height: var(--heatmap-cell);
    border: 1px solid rgba(255, 255, 255, .03);
    border-radius: 3px;
    background: #161b22;
    transition: transform 120ms ease, border-color 120ms ease, background 120ms ease, box-shadow 120ms ease;
  }
  .heatmap-day:hover {
    transform: scale(1.08);
    border-color: rgba(230, 237, 243, .35);
    box-shadow: 0 0 0 1px rgba(230, 237, 243, .22), 0 0 10px rgba(63, 185, 80, .2);
  }
  .heatmap-day.level-1 { background: #0e4429; }
  .heatmap-day.level-2 { background: #006d32; }
  .heatmap-day.level-3 { background: #26a641; }
  .heatmap-day.level-4 { background: #39d353; }
  .heatmap-legend {
    grid-row: 3;
    grid-column: 2;
    position: sticky;
    right: 0;
    justify-self: end;
    display: flex;
    align-items: center;
    gap: 5px;
    width: fit-content;
    margin-top: 8px;
    margin-left: auto;
    padding: 2px 0 0 8px;
    color: var(--text-muted);
    font-size: 11px;
    background: linear-gradient(90deg, transparent, var(--surface) 18%);
  }
  .heatmap-legend-cell {
    width: 10px;
    height: 10px;
    border-radius: 3px;
    display: inline-block;
  }
  .heatmap-legend-cell.level-0 { background: #161b22; }
  .heatmap-legend-cell.level-1 { background: #0e4429; }
  .heatmap-legend-cell.level-2 { background: #006d32; }
  .heatmap-legend-cell.level-3 { background: #26a641; }
  .heatmap-legend-cell.level-4 { background: #39d353; }
  @media (max-width: 900px) {
    .heatmap-container { --heatmap-gap: 3px; }
  }
  @media (max-width: 560px) {
    .heatmap-container { --heatmap-gap: 2px; column-gap: 8px; }
    .day-labels { font-size: 8px; }
  }
  .insight-card {
    display: flex;
    gap: 12px;
    min-height: 136px;
    padding: 15px;
  }
  .insight-card p {
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 650;
  }
  .insight-card strong {
    display: block;
    margin: 5px 0;
    color: var(--text);
    font-size: 18px;
  }
  .tone-positive { box-shadow: inset 0 1px 0 rgba(63, 185, 80, .10); }
  .tone-warning { box-shadow: inset 0 1px 0 rgba(227, 179, 65, .10); }
  .tone-critical { box-shadow: inset 0 1px 0 rgba(248, 81, 73, .10); }
  .chart-wrap {
    position: relative;
    height: 260px;
  }
  .chart-wrap.small {
    height: 210px;
  }
  .leaderboard,
  .repo-list,
  .timeline-feed {
    display: grid;
    gap: 8px;
  }
  .leader-row,
  .repo-row,
  .timeline-item {
    border: 1px solid rgba(48, 54, 61, .75);
    border-radius: var(--radius);
    background: rgba(13, 17, 23, .48);
    transition: background .14s ease, border-color .14s ease, transform .14s ease;
  }
  .leader-row:hover,
  .repo-row:hover,
  .timeline-item:hover {
    border-color: rgba(88, 166, 255, .26);
    background: rgba(88, 166, 255, .045);
  }
  .leader-row {
    display: grid;
    grid-template-columns: 24px 32px 1fr auto;
    gap: 10px;
    align-items: center;
    padding: 10px;
  }
  .leader-rank,
  .leader-score {
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 700;
  }
  .leader-avatar {
    display: grid;
    place-items: center;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    color: #fff;
    font-size: 12px;
    font-weight: 800;
    background: linear-gradient(135deg, #2f81f7, #8957e5);
    overflow: hidden;
    text-decoration: none;
    transition: box-shadow .14s ease;
  }
  .leader-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  a.leader-avatar:hover {
    box-shadow: 0 0 0 3px rgba(88, 166, 255, .10);
  }
  .team-kpi-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    margin-bottom: 16px;
  }
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
  }
  .kpi-card {
    min-width: 0;
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: rgba(13, 17, 23, .5);
  }
  .kpi-card span {
    display: block;
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .kpi-card strong,
  .kpi-person-link {
    display: block;
    margin-top: 8px;
    color: var(--text);
    font-size: 16px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .kpi-card p {
    margin-top: 6px;
    color: var(--text-muted);
    font-size: 12px;
  }
  .team-kpi-grid div {
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: rgba(13, 17, 23, .5);
  }
  .team-kpi-grid span {
    display: block;
    color: var(--text-muted);
    font-size: 12px;
  }
  .team-kpi-grid strong {
    display: block;
    margin-top: 4px;
    color: var(--text);
    font-size: 22px;
  }
  .repo-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 11px 12px;
    color: var(--text);
    text-decoration: none;
  }
  .repo-row span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 650;
  }
  .timeline-feed {
    max-height: 360px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .timeline-item {
    display: grid;
    grid-template-columns: 14px 1fr;
    gap: 10px;
    padding: 11px;
  }
  .timeline-dot {
    width: 9px;
    height: 9px;
    margin-top: 5px;
    border-radius: 50%;
    background: var(--text-link);
    box-shadow: 0 0 0 4px rgba(88, 166, 255, .08);
  }
  .timeline-dot.sync { background: var(--success-text); }
  .timeline-dot.issue { background: var(--warn-text); }
  .timeline-dot.pull_request { background: var(--purple); }
  .timeline-top {
    display: flex;
    justify-content: space-between;
    gap: 10px;
  }
  .timeline-top time {
    flex: 0 0 auto;
    color: var(--text-muted);
    font-size: 11px;
  }
  .empty-state.compact {
    padding: 36px 18px;
  }
  .loading-state {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 150px;
    color: var(--text-muted);
  }
  .mini-spinner {
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--text-link);
    border-radius: 50%;
    animation: spin .65s linear infinite;
  }
  @media (max-width: 1060px) {
    .exec-kpi-grid,
    .insight-grid,
    .kpi-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .exec-grid,
    .exec-grid-main {
      grid-template-columns: 1fr;
    }
  }
  @media (max-width: 720px) {
    .exec-hero {
      align-items: flex-start;
      flex-direction: column;
    }
    .exec-kpi-grid,
    .insight-grid,
    .team-kpi-grid,
    .kpi-grid {
      grid-template-columns: 1fr;
    }
    .health-body {
      grid-template-columns: 1fr;
    }
    .breakdown-row {
      grid-template-columns: 1fr;
    }
    .breakdown-row strong {
      text-align: left;
    }
  }
</style>
{% endblock %}

{% block content %}
{% include 'components/executive_analytics.html' %}
{% endblock %}

{% block page_scripts %}
<script>
const dashboardData = {{ stats | tojson }};

Chart.defaults.color = '#8b949e';
Chart.defaults.borderColor = '#21262d';

function shortRepoName(name) {
  const parts = String(name || '').split('/');
  return parts[parts.length - 1] || name;
}

function emptyChart(canvasId, message) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  canvas.parentElement.innerHTML = `<div class="empty-state compact"><div class="empty-icon"><i data-lucide="bar-chart-3"></i></div><h3>Chưa có tín hiệu</h3><p>${message}</p></div>`;
}

function renderHeatmap() {
  const target = document.getElementById('commit-heatmap');
  const days = dashboardData.heatmap.days || [];
  if (!days.some(day => day.count > 0)) {
    target.innerHTML = `<div class="empty-state compact"><div class="empty-icon"><i data-lucide="calendar-days"></i></div><h3>Chưa phát hiện commit</h3><p>Heatmap sẽ phản ánh nhịp commit trong 365 ngày.</p></div>`;
    return;
  }
  target.innerHTML = `<div class="heatmap-grid">${days.map(day => `<span class="heatmap-day level-${day.level}" title="${day.label}" aria-label="${day.label}"></span>`).join('')}</div>`;
}

function renderLineChart() {
  const rows = dashboardData.charts.global_commits_per_day || [];
  if (!rows.length) {
    emptyChart('commit-trend-chart', 'Chưa phát hiện commit trong 30 ngày qua.');
    return;
  }
  new Chart(document.getElementById('commit-trend-chart'), {
    type: 'line',
    data: {
      labels: rows.map(row => row.date.slice(5)),
      datasets: [{
        data: rows.map(row => row.count),
        borderColor: '#58a6ff',
        backgroundColor: 'rgba(88, 166, 255, .10)',
        fill: true,
        tension: .35,
        pointRadius: 2,
        pointHoverRadius: 5
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { maxTicksLimit: 8 } },
        y: { beginAtZero: true, ticks: { precision: 0 } }
      }
    }
  });
}

function renderRepoRanking() {
  const rows = dashboardData.most_active_repositories || [];
  if (!rows.length) {
    emptyChart('repo-ranking-chart', 'Chưa có repo nổi bật để so sánh.');
    return;
  }
  new Chart(document.getElementById('repo-ranking-chart'), {
    type: 'bar',
    data: {
      labels: rows.map(row => shortRepoName(row.full_name)),
      datasets: [{
        data: rows.map(row => row.commit_count),
        backgroundColor: 'rgba(188, 140, 255, .72)',
        borderRadius: 5
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: {
        x: { beginAtZero: true, ticks: { precision: 0 } },
        y: { grid: { display: false } }
      }
    }
  });
}

function renderTeamChart() {
  const rows = (dashboardData.team.leaderboard || []).slice(0, 6);
  if (!rows.length) {
    emptyChart('team-activity-chart', 'Chưa phát hiện hoạt động đội ngũ.');
    return;
  }
  new Chart(document.getElementById('team-activity-chart'), {
    type: 'bar',
    data: {
      labels: rows.map(row => row.login || row.name),
      datasets: [
        { label: 'Commits', data: rows.map(row => row.commits), backgroundColor: '#58a6ff', borderRadius: 4 },
        { label: 'PR đã merge', data: rows.map(row => row.prs_merged), backgroundColor: '#bc8cff', borderRadius: 4 },
        { label: 'Issue đã xử lý', data: rows.map(row => row.issues_closed), backgroundColor: '#3fb950', borderRadius: 4 }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 10 } } },
      scales: {
        x: { stacked: true, grid: { display: false } },
        y: { stacked: true, beginAtZero: true, ticks: { precision: 0 } }
      }
    }
  });
}

function renderKpiCharts() {
  const contributorRows = dashboardData.kpi_charts.commits_by_contributor || [];
  if (!contributorRows.length || !contributorRows.some(row => row.value > 0)) {
    emptyChart('commits-contributor-pie', 'Chưa có contributor nổi bật.');
  } else {
    new Chart(document.getElementById('commits-contributor-pie'), {
      type: 'pie',
      data: {
        labels: contributorRows.map(row => row.label),
        datasets: [{
          data: contributorRows.map(row => row.value),
          backgroundColor: ['#58a6ff', '#3fb950', '#bc8cff', '#e3b341', '#ff7b72', '#79c0ff', '#a5d6ff', '#8b949e'],
          borderWidth: 0
        }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
    });
  }

  const issueRows = dashboardData.kpi_charts.issues_resolved_by_user || [];
  if (!issueRows.length || !issueRows.some(row => row.value > 0)) {
    emptyChart('issues-user-bar', 'Chưa phát hiện hoạt động xử lý issue.');
  } else {
    new Chart(document.getElementById('issues-user-bar'), {
      type: 'bar',
      data: {
        labels: issueRows.map(row => row.label),
        datasets: [{
          data: issueRows.map(row => row.value),
          backgroundColor: 'rgba(63, 185, 80, .72)',
          borderRadius: 5
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false } },
          y: { beginAtZero: true, ticks: { precision: 0 } }
        }
      }
    });
  }
}

function renderFlowCharts() {
  const prData = dashboardData.health.raw || {};
  const hasPrData = dashboardData.summary.total_prs > 0;
  if (!hasPrData) {
    emptyChart('pr-metrics-chart', 'Chưa có pull request để phân tích.');
  } else {
    new Chart(document.getElementById('pr-metrics-chart'), {
      type: 'doughnut',
      data: {
        labels: ['Tốc độ merge', 'Rủi ro còn lại'],
        datasets: [{
          data: [dashboardData.health.metrics.pr_merge_speed, 100 - dashboardData.health.metrics.pr_merge_speed],
          backgroundColor: ['#58a6ff', '#30363d'],
          borderWidth: 0
        }]
      },
      options: { responsive: true, maintainAspectRatio: false, cutout: '72%', plugins: { legend: { position: 'bottom' } } }
    });
  }

  const hasIssueData = dashboardData.summary.total_issues > 0;
  if (!hasIssueData) {
    emptyChart('issue-metrics-chart', 'Chưa có issue để phân tích.');
  } else {
    new Chart(document.getElementById('issue-metrics-chart'), {
      type: 'pie',
      data: {
        labels: ['Đã xử lý', 'Đang mở', 'Tồn đọng'],
        datasets: [{
          data: [prData.closed_issues || 0, prData.open_issues || 0, prData.stale_issues || 0],
          backgroundColor: ['#3fb950', '#e3b341', '#f85149'],
          borderWidth: 0
        }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
    });
  }
}

function formatTimelineTimes() {
  document.querySelectorAll('[data-ts]').forEach((el) => {
    const value = el.getAttribute('data-ts');
    if (!value) return;
    el.textContent = window.GitAnalyticsTime ? window.GitAnalyticsTime.compact(value) : value;
  });
}

document.addEventListener('DOMContentLoaded', () => {
  renderHeatmap();
  renderLineChart();
  renderRepoRanking();
  renderTeamChart();
  renderKpiCharts();
  renderFlowCharts();
  formatTimelineTimes();
  if (window.lucide) window.lucide.createIcons();
});
</script>
{% endblock %}
