<svg width="100%" viewBox="0 0 680 860" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Hình 2.4 — Activity diagram fetch với pagination</title>
  <desc>Activity diagram mô tả luồng fetch commits với pagination: gọi page 1, kiểm tra rate limit, đọc Link header, lặp qua các page tiếp theo hoặc dừng khi hết data hoặc rate limit exceeded.</desc>
  <defs>
    <style>
      svg {
        background-color: #ffffff;
        font-family: "Inter", "Outfit", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .start-node {
        fill: #2b2b2b;
        stroke: #111111;
        stroke-width: 1;
      }
      .end-node-outer {
        fill: none;
        stroke: #2b2b2b;
        stroke-width: 1.5;
      }
      .end-node-inner {
        fill: #2b2b2b;
      }
      .connection-line {
        fill: none;
        stroke: #2b2b2b;
        stroke-width: 1.5;
      }
      .connection-line-dashed {
        fill: none;
        stroke: #2b2b2b;
        stroke-width: 1.5;
        stroke-dasharray: 4 4;
      }
      .label-bg {
        fill: #ffffff;
      }
      .label-text {
        fill: #2b2b2b;
        font-size: 11px;
        font-weight: 600;
        font-family: inherit;
      }
      .label-text-italic {
        fill: #555555;
        font-size: 11px;
        font-style: italic;
        font-family: inherit;
      }
      .diamond {
        fill: #ffffff;
        stroke: #2b2b2b;
        stroke-width: 1.5;
      }
      .diamond-text-bold {
        fill: #2b2b2b;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: central;
        font-family: inherit;
      }
      .diamond-text {
        fill: #2b2b2b;
        font-size: 12px;
        font-weight: 500;
        text-anchor: middle;
        dominant-baseline: central;
        font-family: inherit;
      }

      /* Action styles (Minimalist black and white UML) */
      .action-blue, .action-green, .action-red, .action-olive {
        fill: #ffffff;
        stroke: #2b2b2b;
        stroke-width: 1.5;
      }
      .action-blue-text-primary, .action-green-text-primary, .action-red-text-primary, .action-olive-text-primary {
        fill: #2b2b2b;
        font-size: 14px;
        font-weight: 600;
        text-anchor: middle;
        dominant-baseline: central;
        font-family: inherit;
      }
      .action-blue-text-secondary, .action-red-text-secondary {
        fill: #555555;
        font-size: 12px;
        text-anchor: middle;
        dominant-baseline: central;
        font-family: inherit;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="#2b2b2b" stroke="#2b2b2b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Solid White Background -->
  <rect width="100%" height="100%" fill="#ffffff" />

  <!-- ── Start node ── -->
  <circle cx="340" cy="36" r="10" class="start-node" />

  <!-- Start → Page -->
  <line x1="340" y1="46" x2="340" y2="80" class="connection-line" marker-end="url(#arrow)" />

  <!-- ── Page node: Gọi page=1, per_page=100 ── -->
  <g>
    <rect x="232" y="80" width="216" height="48" rx="8" class="action-blue" />
    <text x="340" y="100" class="action-blue-text-primary">Gọi page = 1</text>
    <text x="340" y="118" class="action-blue-text-secondary">per_page = 100</text>
  </g>

  <!-- Page → Response -->
  <line x1="340" y1="128" x2="340" y2="158" class="connection-line" marker-end="url(#arrow)" />

  <!-- ── Response node ── -->
  <g>
    <rect x="252" y="158" width="176" height="44" rx="8" class="action-blue" />
    <text x="340" y="180" class="action-blue-text-primary">Nhận response</text>
  </g>

  <!-- Response → CheckRate -->
  <line x1="340" y1="202" x2="340" y2="236" class="connection-line" marker-end="url(#arrow)" />

  <!-- ── CheckRate diamond ── -->
  <polygon points="340,236 430,278 340,320 250,278" class="diamond" />
  <text x="340" y="270" class="diamond-text-bold">Kiểm tra</text>
  <text x="340" y="286" class="diamond-text">X-RateLimit-Remaining</text>

  <!-- CheckRate == 0 → RateLimitErr (right) -->
  <path d="M430 278 L560 278" class="connection-line" marker-end="url(#arrow)" />
  <rect x="440" y="268" width="110" height="18" rx="3" class="label-bg" />
  <text x="495" y="281" text-anchor="middle" class="label-text">[Remaining == 0]</text>

  <!-- ── RateLimitErr node ── -->
  <g>
    <rect x="560" y="254" width="96" height="48" rx="8" class="action-red" />
    <text x="608" y="272" class="action-red-text-primary">Raise</text>
    <text x="608" y="288" class="action-red-text-secondary">RateLimitExceeded</text>
  </g>

  <!-- RateLimitErr → EndErr (down) -->
  <line x1="608" y1="302" x2="608" y2="756" class="connection-line" marker-end="url(#arrow)" />

  <!-- CheckRate > 0 → ParseLink (down) -->
  <line x1="340" y1="320" x2="340" y2="352" class="connection-line" marker-end="url(#arrow)" />
  <rect x="346" y="327" width="90" height="18" rx="3" class="label-bg" />
  <text x="348" y="340" text-anchor="start" class="label-text">[Remaining &gt; 0]</text>

  <!-- ── ParseLink node ── -->
  <g>
    <rect x="232" y="352" width="216" height="44" rx="8" class="action-green" />
    <text x="340" y="374" class="action-green-text-primary">Đọc Link header</text>
  </g>

  <!-- ParseLink → HasNext diamond -->
  <line x1="340" y1="396" x2="340" y2="430" class="connection-line" marker-end="url(#arrow)" />

  <!-- ── HasNext diamond ── -->
  <polygon points="340,430 420,466 340,502 260,466" class="diamond" />
  <text x="340" y="466" class="diamond-text-bold">Có rel=next?</text>

  <!-- HasNext Có → NextPage (down) -->
  <line x1="340" y1="502" x2="340" y2="526" class="connection-line" marker-end="url(#arrow)" />
  <rect x="346" y="504" width="75" height="16" rx="3" class="label-bg" />
  <text x="348" y="516" text-anchor="start" class="label-text">[Có rel=next]</text>

  <!-- ── NextPage node ── -->
  <g>
    <rect x="232" y="526" width="216" height="48" rx="8" class="action-blue" />
    <text x="340" y="546" class="action-blue-text-primary">Tăng page</text>
    <text x="340" y="563" class="action-blue-text-secondary">Gọi page tiếp theo</text>
  </g>

  <!-- NextPage → back to Response (loop arrow up-right) -->
  <path d="M448 550 L530 550 L530 180 L428 180" class="connection-line-dashed" marker-end="url(#arrow)" />
  <rect x="520" y="355" width="28" height="18" rx="3" class="label-bg" />
  <text x="534" y="368" text-anchor="middle" class="label-text-italic">lặp</text>

  <!-- HasNext Không → Done (left loop around NextPage) -->
  <path d="M260 466 L180 466 L180 618 L252 618" class="connection-line" marker-end="url(#arrow)" />
  <rect x="184" y="457" width="105" height="18" rx="3" class="label-bg" />
  <text x="236" y="470" text-anchor="middle" class="label-text">[Không có rel=next]</text>

  <!-- ── Done node ── -->
  <g>
    <rect x="252" y="596" width="176" height="44" rx="8" class="action-green" />
    <text x="340" y="618" class="action-green-text-primary">Đã lấy hết data</text>
  </g>

  <!-- Done → End (down) -->
  <line x1="340" y1="640" x2="340" y2="674" class="connection-line" marker-end="url(#arrow)" />

  <!-- ── End success node ── -->
  <g>
    <rect x="232" y="674" width="216" height="44" rx="22" class="action-olive" />
    <text x="340" y="696" class="action-olive-text-primary">Trả về danh sách</text>
  </g>

  <!-- End success terminal -->
  <line x1="340" y1="718" x2="340" y2="738" class="connection-line" marker-end="url(#arrow)" />
  <circle cx="340" cy="750" r="11" class="end-node-outer" />
  <circle cx="340" cy="750" r="6" class="end-node-inner" />

  <!-- ── End error node ── -->
  <g>
    <rect x="560" y="756" width="96" height="48" rx="22" class="action-red" />
    <text x="608" y="774" class="action-red-text-primary">Dừng sync</text>
    <text x="608" y="791" class="action-red-text-secondary">status = failed</text>
  </g>

  <!-- End error terminal -->
  <line x1="608" y1="804" x2="608" y2="824" class="connection-line" marker-end="url(#arrow)" />
  <circle cx="608" cy="836" r="11" class="end-node-outer" />
  <circle cx="608" cy="836" r="6" class="end-node-inner" />

</svg>