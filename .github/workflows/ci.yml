name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -r requirements.txt
      - name: Test
        run: python -m pytest -q
      - name: Compile
        run: python -m compileall app tests
      - name: Migration head
        run: python -m alembic heads
